server:
  port: ${PORT:8080}

spring:
  application:
    name: inimuws
  datasource:
    url: jdbc:h2:mem:inimuws;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
  thymeleaf:
    cache: false

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5500
      - http://127.0.0.1:5500

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate.SQL: INFO

---
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: jdbc:mysql://localhost:3306/workshop_reservation?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Tokyo
    username: workshop
    password: workshop
    driver-class-name: com.mysql.cj.jdbc.Driver
  h2:
    console:
      enabled: false
