<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workshop Admin Login</title>
  <link rel="stylesheet" th:href="@{/admin/admin.css(v=${adminCssVersion})}">
</head>
<body class="login-body">
<main class="login-shell">
  <div class="login-hero">
    <img class="login-logo" th:src="@{/admin/images/inimu-logo.png}" alt="inimu" onerror="this.remove()">
    <p class="login-title">Workshop Admin Login</p>
  </div>
  <section class="login-panel">
    <p class="muted" th:if="${param.error}">メールアドレスまたはパスワードが違います。</p>
    <p class="muted" th:if="${param.logout}">ログアウトしました。</p>
    <form class="stack" th:action="@{/admin/login}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <label>
        メールアドレス
        <input type="email" name="email" autocomplete="username" required>
      </label>
      <label>
        パスワード
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      <button type="submit">ログイン</button>
    </form>
  </section>
</main>
</body>
</html>
