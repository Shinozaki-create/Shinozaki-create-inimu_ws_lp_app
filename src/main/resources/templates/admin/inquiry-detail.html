<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>問い合わせ詳細</title>
  <link rel="stylesheet" th:href="@{/admin/admin.css(v=${adminCssVersion})}">
</head>
<body>
<header th:replace="~{admin/fragments :: header}"></header>
<main class="page">
  <h1><span th:replace="~{admin/fragments :: icon-inquiries}"></span>問い合わせ詳細</h1>
  <div class="two-column">
    <section class="panel">
      <div class="panel-heading"><h2 th:text="${inquiry.inquiryCode}">INQ-260502-01</h2></div>
      <div class="panel-body">
        <table>
          <tbody>
          <tr><th>受付日時</th><td th:text="${#temporals.format(inquiry.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-02 08:40</td></tr>
          <tr><th>氏名</th><td th:text="${inquiry.customerName()}">中村 悠</td></tr>
          <tr><th>ふりがな</th><td th:text="${inquiry.customerFuriganaHiragana()}">なかむら ゆう</td></tr>
          <tr><th>メール</th><td th:text="${inquiry.customerEmail}">yu.nakamura.inquiry@example.com</td></tr>
          <tr><th>電話</th><td th:text="${inquiry.customerTel}">09011119999</td></tr>
          <tr><th>内容</th><td th:text="${inquiry.customerMessage}">小学生でも参加できますか。</td></tr>
          <tr><th>ステータス</th><td><span class="badge" th:attr="data-status=${inquiry.status.name()}" th:text="${inquiry.status.label}">status</span></td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <div class="panel-body">
        <form class="stack" th:action="@{/admin/inquiries/{id}/status(id=${inquiry.id})}" method="post" th:object="${updateRequest}">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <label>ステータス
            <select th:field="*{status}">
              <option th:each="status : ${inquiryStatuses}" th:value="${status}" th:text="${status.label}">status</option>
            </select>
          </label>
          <label>管理メモ
            <textarea th:field="*{adminMemo}"></textarea>
          </label>
          <button type="submit">更新</button>
        </form>
      </div>
    </section>
  </div>
  <div class="detail-back-actions">
    <a class="button secondary" th:href="@{/admin/inquiries}">問い合わせ管理ページへ戻る</a>
  </div>
</main>
</body>
</html>
