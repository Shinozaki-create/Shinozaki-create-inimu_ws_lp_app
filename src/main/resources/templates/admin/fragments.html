<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header class="admin-header" th:fragment="header">
  <div class="admin-header-inner">
    <a class="brand" th:href="@{/admin}">
      <img class="brand-logo" th:src="@{/admin/images/inimu-logo.png}" alt="inimu" onerror="this.remove()">
      <span class="brand-name">Workshop Admin</span>
    </a>
    <nav class="nav" aria-label="管理メニュー">
      <a class="nav-button" th:href="@{/admin}">
        <span class="nav-button-main">
          <span th:replace="~{admin/fragments :: icon-dashboard}"></span>
          <span class="nav-label">ダッシュボード</span>
        </span>
      </a>
      <a class="nav-button" th:href="@{/admin/reservations}">
        <span class="nav-button-main">
          <span th:replace="~{admin/fragments :: icon-reservations}"></span>
          <span class="nav-label">予約管理</span>
        </span>
        <span class="nav-badge" th:if="${sidebarReservationPendingCount > 0}" th:text="${sidebarReservationPendingCount}">0</span>
      </a>
      <a class="nav-button" th:href="@{/admin/schedules}">
        <span class="nav-button-main">
          <span th:replace="~{admin/fragments :: icon-schedules}"></span>
          <span class="nav-label">ワークショップ設定</span>
        </span>
      </a>
      <a class="nav-button" th:href="@{/admin/sales}">
        <span class="nav-button-main">
          <span th:replace="~{admin/fragments :: icon-sales}"></span>
          <span class="nav-label">売上・レポート</span>
        </span>
      </a>
      <a class="nav-button" th:href="@{/admin/inquiries}">
        <span class="nav-button-main">
          <span th:replace="~{admin/fragments :: icon-inquiries}"></span>
          <span class="nav-label">問い合わせ</span>
        </span>
        <span class="nav-badge" th:if="${sidebarInquiryOpenCount > 0}" th:text="${sidebarInquiryOpenCount}">0</span>
      </a>
    </nav>
    <form class="nav-logout-form" th:action="@{/admin/logout}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button class="nav-logout-button" type="submit">
        <span class="nav-button-main">
          <span th:replace="~{admin/fragments :: icon-logout}"></span>
          <span class="nav-label">ログアウト</span>
        </span>
      </button>
    </form>
  </div>
</header>

<svg xmlns="http://www.w3.org/2000/svg" th:fragment="icon-dashboard" class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <rect x="3" y="4" width="8" height="6" rx="1.5"></rect>
  <rect x="13" y="4" width="8" height="10" rx="1.5"></rect>
  <rect x="3" y="14" width="8" height="6" rx="1.5"></rect>
  <rect x="13" y="16" width="8" height="4" rx="1.5"></rect>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" th:fragment="icon-reservations" class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <rect x="3" y="4" width="18" height="17" rx="2"></rect>
  <path d="M8 2v4M16 2v4M3 10h18"></path>
  <path d="M8 14h3"></path>
  <path d="M8 18h7"></path>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" th:fragment="icon-schedules" class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <path d="M4 7h16"></path>
  <path d="M4 12h16"></path>
  <path d="M4 17h16"></path>
  <circle cx="8" cy="7" r="1.6"></circle>
  <circle cx="15" cy="12" r="1.6"></circle>
  <circle cx="11" cy="17" r="1.6"></circle>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" th:fragment="icon-sales" class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <path d="M4 19h16"></path>
  <path d="M7 19V11"></path>
  <path d="M12 19V7"></path>
  <path d="M17 19v-5"></path>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" th:fragment="icon-inquiries" class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <path d="M4 5h16a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H11l-5 4v-4H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z"></path>
  <path d="M8 10h8"></path>
  <path d="M8 14h5"></path>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" th:fragment="icon-logout" class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <path d="M10 17l5-5-5-5"></path>
  <path d="M15 12H4"></path>
  <path d="M14 4h4a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-4"></path>
</svg>
</body>
</html>
