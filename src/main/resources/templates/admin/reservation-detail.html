<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>予約詳細</title>
  <link rel="stylesheet" th:href="@{/admin/admin.css(v=${adminCssVersion})}">
</head>
<body>
<header th:replace="~{admin/fragments :: header}"></header>
<main class="page">
  <h1><span th:replace="~{admin/fragments :: icon-reservations}"></span>予約詳細</h1>
  <div class="two-column reservation-detail-layout">
    <section class="panel">
      <div class="panel-heading"><h2 th:text="${reservation.reservationCode}">code</h2></div>
      <div class="panel-body">
        <table>
          <tbody>
          <tr>
            <th>予約日時</th>
            <td>
              <span th:text="${reservation.reservationDate}">2026-06-13</span>
              <span th:text="${#temporals.format(reservation.reservationTime, 'HH:mm')}">11:00</span>
            </td>
          </tr>
          <tr><th>人数</th><td th:text="${reservation.reservationCount}">0</td></tr>
          <tr><th>合計金額</th><td th:text="${reservation.formattedTotalAmount()} + '円'">0円</td></tr>
          <tr><th>氏名</th><td th:text="${reservation.customerName()}">name</td></tr>
          <tr><th>ふりがな</th><td th:text="${reservation.customerFuriganaHiragana()}">kana</td></tr>
          <tr><th>メール</th><td th:text="${reservation.customerEmail}">mail</td></tr>
          <tr><th>電話</th><td th:text="${reservation.customerTel}">tel</td></tr>
          <tr><th>メッセージ</th><td th:text="${reservation.customerMessage}">message</td></tr>
          <tr><th>ステータス</th><td><span class="badge" th:attr="data-status=${reservation.status.name()}" th:text="${reservation.status.label}">status</span></td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <div class="panel-body">
        <form class="stack reservation-status-form" th:action="@{/admin/reservations/{id}/status(id=${reservation.id})}" method="post" th:object="${updateRequest}">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <div class="reservation-status-section">
            <label>
              <span class="detail-caption">ステータス</span>
              <select th:field="*{status}">
                <option th:each="status : ${reservationStatuses}" th:value="${status}" th:text="${status.label}">status</option>
              </select>
            </label>
            <input type="hidden" th:field="*{participantCount}">
            <input type="hidden" th:field="*{maleCount}">
            <input type="hidden" th:field="*{femaleCount}">
          </div>

          <div class="reservation-participant-section">
            <div class="detail-caption breakdown-title">参加人数</div>
            <div class="breakdown-table-wrap">
              <table class="breakdown-table" data-breakdown-table>
                <thead>
                <tr>
                  <th></th>
                  <th>～10代</th>
                  <th>20代</th>
                  <th>30代</th>
                  <th>40代</th>
                  <th>50代</th>
                  <th>60代～</th>
                  <th>小計</th>
                  <th>合計</th>
                </tr>
                </thead>
                <tbody>
                <tr data-breakdown-row="male" th:attr="data-base-total=${reservation.effectiveMaleCount()}">
                  <th scope="row">男性</th>
                  <td>
                    <select th:field="*{maleUnder10Count}" data-breakdown-select data-row="male">
                      <option value="">-</option>
                      <option th:each="count : ${ageCountOptions}" th:value="${count}" th:text="${count}">1</option>
                    </select>
                  </td>
                  <td>
                    <select th:field="*{male20sCount}" data-breakdown-select data-row="male">
                      <option value="">-</option>
                      <option th:each="count : ${ageCountOptions}" th:value="${count}" th:text="${count}">1</option>
                    </select>
                  </td>
                  <td>
                    <select th:field="*{male30sCount}" data-breakdown-select data-row="male">
                      <option value="">-</option>
                      <option th:each="count : ${ageCountOptions}" th:value="${count}" th:text="${count}">1</option>
                    </select>
                  </td>
                  <td>
                    <select th:field="*{male40sCount}" data-breakdown-select data-row="male">
                      <option value="">-</option>
                      <option th:each="count : ${ageCountOptions}" th:value="${count}" th:text="${count}">1</option>
                    </select>
                  </td>
                  <td>
                    <select th:field="*{male50sCount}" data-breakdown-select data-row="male">
                      <option value="">-</option>
                      <option th:each="count : ${ageCountOptions}" th:value="${count}" th:text="${count}">1</option>
                    </select>
                  </td>
                  <td>
                    <select th:field="*{male60PlusCount}" data-breakdown-select data-row="male">
                      <option value="">-</option>
                      <option th:each="count : ${ageCountOptions}" th:value="${count}" th:text="${count}">1</option>
                    </select>
                  </td>
                  <td class="breakdown-subtotal" data-row-total="male" th:text="${reservation.effectiveMaleCount()}">0</td>
                  <td class="breakdown-total" rowspan="2" data-grand-total th:attr="data-base-total=${reservation.effectiveParticipantCount()}" th:text="${reservation.effectiveParticipantCount()}">0</td>
                </tr>
                <tr data-breakdown-row="female" th:attr="data-base-total=${reservation.effectiveFemaleCount()}">
                  <th scope="row">女性</th>
                  <td>
                    <select th:field="*{femaleUnder10Count}" data-breakdown-select data-row="female">
                      <option value="">-</option>
                      <option th:each="count : ${ageCountOptions}" th:value="${count}" th:text="${count}">1</option>
                    </select>
                  </td>
                  <td>
                    <select th:field="*{female20sCount}" data-breakdown-select data-row="female">
                      <option value="">-</option>
                      <option th:each="count : ${ageCountOptions}" th:value="${count}" th:text="${count}">1</option>
                    </select>
                  </td>
                  <td>
                    <select th:field="*{female30sCount}" data-breakdown-select data-row="female">
                      <option value="">-</option>
                      <option th:each="count : ${ageCountOptions}" th:value="${count}" th:text="${count}">1</option>
                    </select>
                  </td>
                  <td>
                    <select th:field="*{female40sCount}" data-breakdown-select data-row="female">
                      <option value="">-</option>
                      <option th:each="count : ${ageCountOptions}" th:value="${count}" th:text="${count}">1</option>
                    </select>
                  </td>
                  <td>
                    <select th:field="*{female50sCount}" data-breakdown-select data-row="female">
                      <option value="">-</option>
                      <option th:each="count : ${ageCountOptions}" th:value="${count}" th:text="${count}">1</option>
                    </select>
                  </td>
                  <td>
                    <select th:field="*{female60PlusCount}" data-breakdown-select data-row="female">
                      <option value="">-</option>
                      <option th:each="count : ${ageCountOptions}" th:value="${count}" th:text="${count}">1</option>
                    </select>
                  </td>
                  <td class="breakdown-subtotal" data-row-total="female" th:text="${reservation.effectiveFemaleCount()}">0</td>
                </tr>
                </tbody>
              </table>
            </div>
          </div>

          <div class="reservation-memo-section">
            <label>
              <span class="detail-caption">管理メモ</span>
              <textarea th:field="*{adminMemo}"></textarea>
            </label>
          </div>
          <button class="toolbar-submit" type="submit">更新</button>
        </form>
      </div>
    </section>
  </div>
  <div class="detail-back-actions">
    <a class="button secondary" th:href="@{/admin/reservations}">予約管理ページへ戻る</a>
  </div>
</main>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const table = document.querySelector('[data-breakdown-table]');
    if (!table) {
      return;
    }

    const rowConfigs = Array.from(table.querySelectorAll('[data-breakdown-row]')).map((row) => {
      const gender = row.dataset.breakdownRow;
      return {
        row,
        gender,
        subtotalCell: table.querySelector(`[data-row-total="${gender}"]`),
        selects: Array.from(row.querySelectorAll('select[data-breakdown-select]')),
        baseTotal: Number(row.dataset.baseTotal || 0),
      };
    });
    const totalCell = table.querySelector('[data-grand-total]');

      const updateTotals = () => {
        let grandTotal = 0;
        const hiddenParticipantCount = table.querySelector('input[name="participantCount"]');
        const hiddenMaleCount = table.querySelector('input[name="maleCount"]');
        const hiddenFemaleCount = table.querySelector('input[name="femaleCount"]');
        let maleTotal = 0;
        let femaleTotal = 0;

        rowConfigs.forEach((config) => {
          const selectedTotal = config.selects.reduce((sum, select) => {
            return sum + (select.value === '' ? 0 : Number(select.value));
          }, 0);
          const displayTotal = selectedTotal > 0 ? selectedTotal : config.baseTotal;
          if (config.subtotalCell) {
            config.subtotalCell.textContent = displayTotal;
          }
          if (config.gender === 'male') {
            maleTotal = displayTotal;
          } else if (config.gender === 'female') {
            femaleTotal = displayTotal;
          }
          grandTotal += displayTotal;
        });

        if (totalCell) {
          totalCell.textContent = grandTotal;
        }
        if (hiddenParticipantCount) {
          hiddenParticipantCount.value = grandTotal;
        }
        if (hiddenMaleCount) {
          hiddenMaleCount.value = maleTotal;
        }
        if (hiddenFemaleCount) {
          hiddenFemaleCount.value = femaleTotal;
        }
      };

    table.querySelectorAll('select[data-breakdown-select]').forEach((select) => {
      select.addEventListener('change', updateTotals);
    });

    updateTotals();
  });
</script>
</body>
</html>
