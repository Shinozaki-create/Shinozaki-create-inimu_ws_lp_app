<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>開催日管理</title>
  <link rel="stylesheet" th:href="@{/admin/admin.css(v=${adminCssVersion})}">
</head>
<body>
<header th:replace="~{admin/fragments :: header}"></header>
<main class="page schedule-page">
  <h1><span th:replace="~{admin/fragments :: icon-schedules}"></span>開催日管理</h1>

  <section class="panel schedule-create-panel">
    <div class="panel-heading">
      <h2>開催日作成</h2>
    </div>
    <div class="panel-body stack">
      <form class="stack schedule-create-form"
            th:action="@{/admin/schedules(month=${targetMonthQuery})}"
            method="post"
            th:object="${scheduleCreateRequest}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="schedule-alert reservation-create-alert" th:if="${scheduleError != null}">
          <p th:text="${scheduleError}">error</p>
        </div>
        <div class="schedule-alert reservation-create-alert" th:if="${#fields.hasAnyErrors()}">
          <p th:each="error : ${#fields.errors('*')}" th:text="${error}">error</p>
        </div>

        <div class="schedule-create-layout">
          <div class="schedule-create-row schedule-create-row--top">
            <div class="schedule-create-group schedule-create-group--slots">
              <span class="schedule-create-group-label">対象時間枠</span>
              <div class="schedule-slot-picker-grid" aria-label="作成する時間枠">
                <label class="schedule-fixed-slot">
                  <input type="checkbox" th:field="*{slot1}">
                  <span class="schedule-fixed-slot-time">11:00-12:00</span>
                </label>
                <label class="schedule-fixed-slot">
                  <input type="checkbox" th:field="*{slot2}">
                  <span class="schedule-fixed-slot-time">13:00-14:00</span>
                </label>
                <label class="schedule-fixed-slot">
                  <input type="checkbox" th:field="*{slot3}">
                  <span class="schedule-fixed-slot-time">15:00-16:00</span>
                </label>
              </div>
            </div>
            <label class="schedule-create-field schedule-create-field--date">
              <span class="schedule-create-field-label">開始日</span>
              <input type="date" th:field="*{startDate}" required>
            </label>
            <label class="schedule-create-field schedule-create-field--date">
              <span class="schedule-create-field-label">終了日</span>
              <input type="date" th:field="*{endDate}" required>
            </label>
          </div>

          <div class="schedule-create-row schedule-create-row--middle">
            <div class="schedule-create-group schedule-create-group--weekdays">
              <span class="schedule-create-group-label">曜日</span>
              <div class="weekday-picker-grid">
                <label><input type="checkbox" th:field="*{monday}">月</label>
                <label><input type="checkbox" th:field="*{tuesday}">火</label>
                <label><input type="checkbox" th:field="*{wednesday}">水</label>
                <label><input type="checkbox" th:field="*{thursday}">木</label>
                <label><input type="checkbox" th:field="*{friday}">金</label>
                <label><input type="checkbox" th:field="*{saturday}">土</label>
                <label><input type="checkbox" th:field="*{sunday}">日</label>
                <label><input type="checkbox" th:field="*{holiday}">祝日</label>
              </div>
            </div>
            <label class="schedule-create-field schedule-create-field--capacity">
              <span class="schedule-create-field-label">各枠定員数</span>
              <input type="number" th:field="*{capacity}" min="0" required>
            </label>
          </div>

          <div class="schedule-create-row schedule-create-row--bottom">
            <label class="schedule-create-field schedule-create-field--note">
              <span class="schedule-create-field-label">メモ</span>
              <input type="text" th:field="*{note}" maxlength="500">
            </label>
            <div class="schedule-create-actions">
              <label class="schedule-toggle">
                <input type="checkbox" th:field="*{open}">
                <span>公開</span>
              </label>
              <button class="schedule-create-submit" type="submit">作成</button>
            </div>
          </div>
        </div>
      </form>
    </div>
  </section>

  <section class="panel schedule-calendar-panel">
    <div class="panel-heading schedule-calendar-heading">
      <div class="schedule-month-nav">
        <a class="month-nav-button schedule-month-nav-button" th:href="@{/admin/schedules(month=${prevMonthQuery})}" aria-label="前の月">&lt;</a>
        <h2 th:text="${targetMonthLabel}">2026年6月</h2>
        <a class="month-nav-button schedule-month-nav-button" th:href="@{/admin/schedules(month=${nextMonthQuery})}" aria-label="次の月">&gt;</a>
      </div>
      <p class="muted">日付をクリックすると、下の各日編集へ移動します。</p>
    </div>
    <div class="panel-body">
      <div class="calendar-weekdays schedule-calendar-weekdays" aria-hidden="true">
        <span>日</span>
        <span>月</span>
        <span>火</span>
        <span>水</span>
        <span>木</span>
        <span>金</span>
        <span>土</span>
      </div>
      <div class="schedule-calendar-grid">
        <th:block th:each="week : ${calendarWeeks}">
          <th:block th:each="day : ${week}">
            <article class="schedule-day-card"
                     th:classappend="${!day.currentMonth() ? ' is-outside' : (day.hasSchedule() ? (day.open() ? (day.fullyBooked() ? ' is-full' : ' is-open') : ' is-paused') : ' is-empty')}">
              <div class="schedule-day-card-head">
                <a class="calendar-day-number schedule-day-link"
                   th:if="${day.hasSchedule()}"
                   th:href="${'#schedule-' + #temporals.format(day.date(), 'yyyy-MM-dd')}"
                   th:attr="data-schedule-target=${'schedule-' + #temporals.format(day.date(), 'yyyy-MM-dd')},aria-label=${#temporals.format(day.date(), 'yyyy-MM-dd') + ' の編集へ'}"
                   th:text="${day.date().dayOfMonth}">1</a>
                <span class="calendar-day-number" th:unless="${day.hasSchedule()}" th:text="${day.date().dayOfMonth}">1</span>
                <span class="badge" th:if="${day.hasSchedule()}" th:text="${day.open() ? '公開' : '休止'}">公開</span>
              </div>
              <div class="schedule-day-slots" th:if="${day.hasSchedule()}">
                <div class="schedule-day-slot"
                     th:each="slot : ${day.timeSlots()}"
                     th:classappend="${!slot.active() ? ' is-inactive' : (slot.fullyBooked() ? ' is-full' : '')}">
                  <span class="schedule-day-slot-time"
                        th:text="${#temporals.format(slot.startTime(), 'HH:mm')}">11:00</span>
                  <span class="schedule-day-slot-capacity"
                        th:text="${'（' + slot.capacity() + '）'}">（10）</span>
                  <span class="schedule-day-slot-remaining"
                        th:text="${'残:' + slot.remainingCount()}">残:10</span>
                </div>
              </div>
            </article>
          </th:block>
        </th:block>
      </div>
    </div>
  </section>

  <section class="panel schedule-list-panel">
    <div class="panel-heading">
      <h2>各日編集</h2>
    </div>
    <div class="panel-body stack">
      <details class="schedule-details"
               th:each="schedule : ${schedules}"
               th:id="${'schedule-' + #temporals.format(schedule.scheduleDate, 'yyyy-MM-dd')}">
        <summary class="schedule-summary">
          <span class="schedule-summary-main">
            <span class="schedule-summary-date" th:text="${schedule.scheduleDate}">2026-06-06</span>
            <span class="badge" th:text="${schedule.open ? '公開' : '休止'}">公開</span>
          </span>
          <span class="schedule-summary-action">詳細</span>
        </summary>
        <div class="schedule-details-body">
          <div class="schedule-details-main">
            <form th:each="slot : ${schedule.timeSlots}"
                  th:id="${'slot-form-' + slot.id}"
                  th:action="@{/admin/schedules/slots/{id}(id=${slot.id}, month=${targetMonthQuery})}"
                  method="post"
                  hidden>
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <input type="hidden" name="active" value="false">
            </form>

            <table class="schedule-slot-table">
              <thead>
              <tr>
                <th>時間枠</th>
                <th>定員</th>
                <th>予約数</th>
                <th>残席</th>
                <th>ステータス</th>
                <th>更新</th>
                <th></th>
              </tr>
              </thead>
              <tbody>
              <tr th:each="slot, iterStat : ${schedule.timeSlots}">
                <td>
                  <strong th:text="${#temporals.format(slot.startTime, 'HH:mm') + ' - ' + #temporals.format(slot.endTime, 'HH:mm')}">11:00 - 12:00</strong>
                </td>
                <td th:text="${slot.capacity}">10</td>
                <td th:text="${slot.reservedCount}">0</td>
                <td th:text="${slot.remainingCount()}">10</td>
                <td>
                  <span class="badge" th:text="${slot.active ? '受付中' : '停止'}">受付中</span>
                </td>
                <td class="schedule-slot-update-cell">
                  <label class="schedule-slot-inline-label">
                    <span>定員：</span>
                    <input class="schedule-slot-capacity-input"
                           type="number"
                           name="capacity"
                           min="0"
                           th:value="${slot.capacity}"
                           th:attr="form=${'slot-form-' + slot.id},data-slot-auto-submit='true'">
                  </label>
                  <label class="schedule-slot-flag">
                    <input type="checkbox"
                           name="active"
                           value="true"
                           th:checked="${slot.active}"
                           th:attr="form=${'slot-form-' + slot.id},data-slot-auto-submit='true'">
                    <span>受付</span>
                  </label>
                </td>
                <td th:if="${iterStat.first}" th:rowspan="${#lists.size(schedule.timeSlots)}" class="schedule-slot-side-cell">
                  <form class="schedule-side-form" th:action="@{/admin/schedules/{id}(id=${schedule.id}, month=${targetMonthQuery})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="open" value="false">
                    <label class="schedule-side-open-check">
                      <input type="checkbox" name="open" value="true" th:checked="${schedule.open}">
                      <span>公開</span>
                    </label>
                    <button type="submit">更新</button>
                    <label class="schedule-side-note">
                      <span>メモ</span>
                      <textarea name="note" rows="4" maxlength="500" th:text="${schedule.note == '土日開催' ? '' : schedule.note}"></textarea>
                    </label>
                  </form>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(schedule.timeSlots)}">
                <td colspan="7" class="muted">時間枠はありません。</td>
              </tr>
              </tbody>
            </table>
          </div>
        </div>
      </details>
      <p th:if="${#lists.isEmpty(schedules)}" class="muted">この月の開催日はありません。</p>
    </div>
  </section>
</main>
<script>
  (() => {
    const openScheduleDetails = (targetId, focusFirstField = false) => {
      if (!targetId) {
        return;
      }

      const details = document.getElementById(targetId);
      if (!(details instanceof HTMLDetailsElement)) {
        return;
      }

      details.open = true;
      details.scrollIntoView({behavior: 'smooth', block: 'start'});

      if (!focusFirstField) {
        return;
      }

      const focusTarget = details.querySelector('input, select, textarea, button');
      if (focusTarget instanceof HTMLElement) {
        focusTarget.focus({preventScroll: true});
      }
    };

    document.querySelectorAll('[data-schedule-target]').forEach((link) => {
      link.addEventListener('click', (event) => {
        const targetId = link.getAttribute('data-schedule-target');
        if (!targetId) {
          return;
        }

        event.preventDefault();
        openScheduleDetails(targetId, true);
        history.replaceState(null, '', `#${targetId}`);
      });
    });

    document.querySelectorAll('[data-slot-auto-submit]').forEach((input) => {
      input.addEventListener('change', () => {
        const formId = input.getAttribute('form');
        if (!formId) {
          return;
        }

        const form = document.getElementById(formId);
        if (form instanceof HTMLFormElement) {
          form.requestSubmit();
        }
      });
    });

    const openFromHash = () => {
      const targetId = window.location.hash.replace('#', '');
      if (targetId) {
        openScheduleDetails(targetId, false);
      }
    };

    openFromHash();
    window.addEventListener('hashchange', openFromHash);
  })();
</script>
</body>
</html>
