<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新規追加</title>
  <link rel="stylesheet" th:href="@{/admin/admin.css(v=${adminCssVersion})}">
</head>
<body>
<header th:replace="~{admin/fragments :: header}"></header>
<main class="page">
  <h1><span th:replace="~{admin/fragments :: icon-reservations}"></span>新規追加</h1>

  <section class="panel">
    <div class="panel-heading">
      <h2>予約情報</h2>
    </div>
    <div class="panel-body">
      <form class="stack reservation-create-form" th:action="@{/admin/reservations}" method="post" th:object="${reservationRequest}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" th:field="*{inquiryOnly}">
        <input type="hidden" th:field="*{privacyAccepted}">

        <div class="reservation-create-alert" th:if="${reservationError}" th:text="${reservationError}"></div>
        <div class="reservation-create-alert" th:if="${#fields.hasErrors('*')}">
          <p th:each="error : ${#fields.errors('*')}" th:text="${error}">error</p>
        </div>

        <div class="reservation-create-row reservation-create-row--single">
          <label class="reservation-create-field reservation-create-field--full">
            <span class="detail-caption">予約番号</span>
            <input type="text" data-reservation-code-preview readonly placeholder="日付を入力すると表示されます">
          </label>
        </div>

        <div class="reservation-create-row reservation-create-row--two">
          <label>
            <span class="detail-caption">予約日</span>
            <input type="date" th:field="*{reservationDate}" data-reservation-date required>
          </label>
          <label>
            <span class="detail-caption">予約時間</span>
            <select th:field="*{reservationTime}"
                    data-reservation-time
                    th:attr="data-selected-value=${reservationRequest.reservationTime != null ? #temporals.format(reservationRequest.reservationTime, 'HH:mm') : ''}"
                    required>
              <option value="">日付を選択してください</option>
            </select>
          </label>
        </div>

        <div class="reservation-create-row reservation-create-row--single">
          <label class="reservation-create-field reservation-create-field--full">
            <span class="detail-caption">人数</span>
            <select th:field="*{reservationCount}" required>
              <option th:each="count : ${reservationCountOptions}" th:value="${count}" th:text="${count}">1</option>
            </select>
          </label>
        </div>

        <div class="reservation-create-row reservation-create-row--two">
          <label>
            <span class="detail-caption">姓</span>
            <input type="text" th:field="*{customerFamilyName}" required>
          </label>
          <label>
            <span class="detail-caption">名</span>
            <input type="text" th:field="*{customerGivenName}" required>
          </label>
        </div>

        <div class="reservation-create-row reservation-create-row--two">
          <label>
            <span class="detail-caption">せい</span>
            <input type="text" th:field="*{customerFamilyKana}" required>
          </label>
          <label>
            <span class="detail-caption">めい</span>
            <input type="text" th:field="*{customerGivenKana}" required>
          </label>
        </div>

        <div class="reservation-create-row reservation-create-row--single">
          <label class="reservation-create-field reservation-create-field--full">
            <span class="detail-caption">メールアドレス</span>
            <input type="email" th:field="*{customerEmail}" required>
          </label>
        </div>

        <div class="reservation-create-row reservation-create-row--single">
          <label class="reservation-create-field reservation-create-field--full">
            <span class="detail-caption">電話番号</span>
            <input type="tel" th:field="*{customerTel}">
          </label>
        </div>

        <div class="reservation-create-row reservation-create-row--single">
          <label class="reservation-create-field reservation-create-field--full reservation-create-message">
            <span class="detail-caption">メモ</span>
            <textarea th:field="*{customerMessage}"></textarea>
          </label>
        </div>

        <div class="reservation-create-actions">
          <a class="button secondary" th:href="@{/admin/reservations}">一覧へ戻る</a>
          <button class="toolbar-submit" type="submit">登録</button>
        </div>
      </form>
    </div>
  </section>
</main>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const dateInput = document.querySelector('[data-reservation-date]');
    const codePreview = document.querySelector('[data-reservation-code-preview]');
    const timeSelect = document.querySelector('[data-reservation-time]');

    if (!dateInput || !codePreview || !timeSelect) {
      return;
    }

    const setTimeOptions = (slots) => {
      const selectedValue = timeSelect.dataset.selectedValue || '';
      timeSelect.innerHTML = '';

      const placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.textContent = '時間を選択してください';
      timeSelect.appendChild(placeholder);

      slots
        .filter((slot) => slot.active && !slot.fullyBooked)
        .forEach((slot) => {
          const option = document.createElement('option');
          option.value = slot.startTime;
          option.textContent = `${slot.startTime} - ${slot.endTime}`;
          timeSelect.appendChild(option);
        });

      timeSelect.disabled = timeSelect.options.length <= 1;
      if (selectedValue) {
        timeSelect.value = selectedValue;
      }
    };

    const clearTimeOptions = () => {
      timeSelect.innerHTML = '';
      const option = document.createElement('option');
      option.value = '';
      option.textContent = '日付を選択してください';
      timeSelect.appendChild(option);
      timeSelect.disabled = true;
    };

    const updatePreviewAndSlots = async () => {
      const dateValue = dateInput.value.trim();
      timeSelect.dataset.selectedValue = timeSelect.value;

      if (!dateValue) {
        codePreview.value = '';
        clearTimeOptions();
        return;
      }

      try {
        const [codeResponse, slotsResponse] = await Promise.all([
          fetch(`/admin/reservations/code?date=${encodeURIComponent(dateValue)}`),
          fetch(`/api/schedules/${encodeURIComponent(dateValue)}/slots`)
        ]);

        if (codeResponse.ok) {
          codePreview.value = await codeResponse.text();
        } else {
          codePreview.value = '';
        }

        if (slotsResponse.ok) {
          const slots = await slotsResponse.json();
          setTimeOptions(slots);
        } else {
          clearTimeOptions();
        }
      } catch (error) {
        codePreview.value = '';
        clearTimeOptions();
      }
    };

    dateInput.addEventListener('change', updatePreviewAndSlots);
    updatePreviewAndSlots();
  });
</script>
</body>
</html>
